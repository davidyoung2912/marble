<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Tilt Marble — Prototype</title>
<style>
  :root {
    --steel-dark: #14171c;
    --steel: #1e2229;
    --steel-light: #2a2f38;
    --accent: #5ec8d8;
    --accent-dim: #3a7d88;
    --text: #e7edf2;
    --text-dim: #7b8794;
    --danger: #d86a5e;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--steel-dark);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    touch-action: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: block;
    background:
      radial-gradient(circle at 50% 40%, #232830 0%, #14171c 75%);
  }

  /* --- HUD --- */
  #hud {
    position: fixed;
    top: env(safe-area-inset-top, 0);
    left: 0;
    right: 0;
    padding: 14px 18px 0 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }

  .hud-block {
    background: rgba(20, 23, 28, 0.55);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 8px 12px;
    backdrop-filter: blur(6px);
  }

  .hud-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .hud-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
  }

  /* --- Overlay / permission screen --- */
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: radial-gradient(circle at 50% 35%, #1c2028 0%, #101317 80%);
    padding: 32px;
    z-index: 10;
    transition: opacity 0.4s ease;
  }

  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .marble-preview {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    margin-bottom: 22px;
    background: radial-gradient(circle at 32% 28%, #f5f7f9 0%, #b7c1cb 22%, #6b7580 55%, #2a2f38 85%, #16181c 100%);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 0 8px rgba(255,255,255,0.15);
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 8px 0;
    letter-spacing: 0.01em;
  }

  p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.5;
    max-width: 320px;
    margin: 0 0 26px 0;
  }

  button {
    appearance: none;
    border: none;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
    color: #0a1214;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 30px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(94, 200, 216, 0.25);
  }

  button:active { transform: scale(0.97); }

  #status {
    margin-top: 18px;
    font-size: 12px;
    color: var(--text-dim);
    max-width: 300px;
  }

  #status.warn { color: var(--danger); }

  #recenter {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom, 0));
    right: 18px;
    z-index: 5;
    padding: 10px 16px;
    font-size: 13px;
    background: rgba(30, 34, 41, 0.7);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: none;
  }
</style>
</head>
<body>

<canvas id="stage"></canvas>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Tilt</div>
    <div class="hud-value" id="tiltReadout">0°, 0°</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Speed</div>
    <div class="hud-value" id="speedReadout">0.0</div>
  </div>
</div>

<button id="recenter">Recenter</button>

<div id="overlay">
  <div class="marble-preview"></div>
  <h1>Tilt Marble</h1>
  <p>Hold your phone flat. Tilt it in any direction to roll the marble — tilt the other way to slow, stop, or reverse it.</p>
  <button id="startBtn">Start</button>
  <div id="status"></div>
</div>

<script>
(function () {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const statusEl = document.getElementById('status');
  const recenterBtn = document.getElementById('recenter');
  const tiltReadout = document.getElementById('tiltReadout');
  const speedReadout = document.getElementById('speedReadout');

  let W, H, DPR;
  function resize() {
    DPR = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Physics state ----
  const marble = {
    x: 0, y: 0,
    vx: 0, vy: 0,
    r: 16
  };

  function resetMarble() {
    marble.x = W / 2;
    marble.y = H / 2;
    marble.vx = 0;
    marble.vy = 0;
  }
  resetMarble();

  // Tunable physics constants
  const SENSITIVITY = 620;   // px/s^2 per unit of tilt fraction (at max tilt)
  const MAX_TILT_DEG = 35;   // tilt angle (deg) that maps to "full" acceleration
  const FRICTION = 0.86;     // velocity damping per second (rolling friction)
  const RESTITUTION = 0.55;  // bounce energy retained off walls
  const DEADZONE_DEG = 1.5;  // ignore tiny tilt noise

  // Calibration offsets (recenter support)
  let betaOffset = 0, gammaOffset = 0;
  let rawBeta = 0, rawGamma = 0;

  let running = false;
  let lastTime = null;

  function handleOrientation(e) {
    if (e.beta === null || e.gamma === null) return;
    rawBeta = e.beta;
    rawGamma = e.gamma;
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function currentTilt() {
    // beta: front-back tilt (-180..180), gamma: left-right tilt (-90..90)
    let beta = rawBeta - betaOffset;
    let gamma = rawGamma - gammaOffset;
    // Wrap beta into -180..180 in case of offset wraparound
    if (beta > 180) beta -= 360;
    if (beta < -180) beta += 360;
    return { beta, gamma };
  }

  function step(dt) {
    const { beta, gamma } = currentTilt();

    // Apply deadzone
    let b = Math.abs(beta) < DEADZONE_DEG ? 0 : beta;
    let g = Math.abs(gamma) < DEADZONE_DEG ? 0 : gamma;

    // Normalize to -1..1 based on MAX_TILT_DEG, then scale to acceleration
    const gx = clamp(g / MAX_TILT_DEG, -1, 1);
    const gy = clamp(b / MAX_TILT_DEG, -1, 1);

    const ax = gx * SENSITIVITY;
    const ay = gy * SENSITIVITY;

    marble.vx += ax * dt;
    marble.vy += ay * dt;

    // Rolling friction (exponential damping, frame-rate independent)
    const damp = Math.pow(FRICTION, dt);
    marble.vx *= damp;
    marble.vy *= damp;

    marble.x += marble.vx * dt;
    marble.y += marble.vy * dt;

    // Wall collisions
    const r = marble.r;
    if (marble.x < r) { marble.x = r; marble.vx = -marble.vx * RESTITUTION; }
    if (marble.x > W - r) { marble.x = W - r; marble.vx = -marble.vx * RESTITUTION; }
    if (marble.y < r) { marble.y = r; marble.vy = -marble.vy * RESTITUTION; }
    if (marble.y > H - r) { marble.y = H - r; marble.vy = -marble.vy * RESTITUTION; }

    // HUD
    tiltReadout.textContent = `${b.toFixed(0)}°, ${g.toFixed(0)}°`;
    const speed = Math.hypot(marble.vx, marble.vy);
    speedReadout.textContent = (speed / 100).toFixed(1);
  }

  // ---- Rendering ----
  const GRID_SIZE = 48;

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Flat surface: subtle grid to visualize tilt/motion
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.035)';
    ctx.lineWidth = 1;
    const offsetX = (marble.x * 0.15) % GRID_SIZE;
    const offsetY = (marble.y * 0.15) % GRID_SIZE;
    for (let x = -GRID_SIZE; x < W + GRID_SIZE; x += GRID_SIZE) {
      ctx.beginPath();
      ctx.moveTo(x - offsetX, 0);
      ctx.lineTo(x - offsetX, H);
      ctx.stroke();
    }
    for (let y = -GRID_SIZE; y < H + GRID_SIZE; y += GRID_SIZE) {
      ctx.beginPath();
      ctx.moveTo(0, y - offsetY);
      ctx.lineTo(W, y - offsetY);
      ctx.stroke();
    }
    ctx.restore();

    // Marble shadow (offset opposite to velocity slightly, grows with height illusion)
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(marble.x, marble.y + marble.r * 0.55, marble.r * 0.95, marble.r * 0.4, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.filter = 'blur(2px)';
    ctx.fill();
    ctx.restore();

    // Marble body — metallic radial gradient
    const grad = ctx.createRadialGradient(
      marble.x - marble.r * 0.35, marble.y - marble.r * 0.4, marble.r * 0.1,
      marble.x, marble.y, marble.r
    );
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.18, '#e8edf1');
    grad.addColorStop(0.4, '#aab4bf');
    grad.addColorStop(0.7, '#5b6570');
    grad.addColorStop(1, '#1c2026');

    ctx.beginPath();
    ctx.arc(marble.x, marble.y, marble.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Rim light
    ctx.beginPath();
    ctx.arc(marble.x, marble.y, marble.r - 0.5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(94, 200, 216, 0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function loop(t) {
    if (!running) return;
    if (lastTime === null) lastTime = t;
    let dt = (t - lastTime) / 1000;
    dt = Math.min(dt, 0.05); // clamp for tab-switch spikes
    lastTime = t;

    step(dt);
    draw();

    requestAnimationFrame(loop);
  }

  function startLoop() {
    if (running) return;
    running = true;
    lastTime = null;
    requestAnimationFrame(loop);
  }

  // ---- Permission / start flow ----
  function beginGame() {
    overlay.classList.add('hidden');
    resetMarble();
    startLoop();
  }

  function setupOrientationListener() {
    window.addEventListener('deviceorientation', handleOrientation, true);
  }

  startBtn.addEventListener('click', async () => {
    // iOS 13+ requires explicit permission request from a user gesture
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result === 'granted') {
          setupOrientationListener();
          beginGame();
        } else {
          statusEl.textContent = 'Motion access denied. Enable it in Settings → Safari → Motion & Orientation Access, then reload.';
          statusEl.classList.add('warn');
        }
      } catch (err) {
        statusEl.textContent = 'Could not request motion permission: ' + err.message;
        statusEl.classList.add('warn');
      }
    } else if (window.DeviceOrientationEvent) {
      // Android / older browsers — no explicit permission step
      setupOrientationListener();
      beginGame();
    } else {
      statusEl.textContent = 'This device/browser does not support motion tilt input.';
      statusEl.classList.add('warn');
    }
  });

  recenterBtn.addEventListener('click', () => {
    betaOffset = rawBeta;
    gammaOffset = rawGamma;
  });

})();
</script>
</body>
</html>
