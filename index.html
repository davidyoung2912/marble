<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Tilt Marble</title>
<style>
  :root {
    --steel-dark: #14171c;
    --steel: #1e2229;
    --steel-light: #2a2f38;
    --accent: #5ec8d8;
    --accent-dim: #3a7d88;
    --text: #e7edf2;
    --text-dim: #7b8794;
    --danger: #d86a5e;
    --success: #7ed6a5;
    --warn: #e8c468;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background: var(--steel-dark);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    touch-action: none;
  }
  .screen {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    background: radial-gradient(circle at 50% 30%, #1c2028 0%, #101317 80%);
    padding: env(safe-area-inset-top, 18px) 18px env(safe-area-inset-bottom, 18px) 18px;
    overflow-y: auto;
  }
  .screen.active { display: flex; }

  /* ---------- Shared bits ---------- */
  h1.title { font-size: 22px; font-weight: 700; margin: 6px 0 2px 0; }
  p.subtitle { font-size: 13px; color: var(--text-dim); margin: 0 0 18px 0; line-height: 1.5; }
  .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .backBtn {
    appearance: none; border: none; background: var(--steel-light); color: var(--text);
    font-size: 14px; padding: 8px 14px; border-radius: 10px; font-weight: 600;
  }
  .backBtn:active { transform: scale(0.96); }

  /* ---------- Category menu ---------- */
  .catGrid { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .catCard {
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(180deg, var(--steel-light) 0%, var(--steel) 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 14px 16px;
    text-align: left;
  }
  .catCard:active { transform: scale(0.98); }
  .catIcon {
    width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; background: rgba(94,200,216,0.12);
  }
  .catInfo { flex: 1; min-width: 0; }
  .catName { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .catDesc { font-size: 12px; color: var(--text-dim); line-height: 1.35; }
  .catOrder { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 0.05em; margin-bottom: 3px; }
  .catStars { font-size: 11px; color: var(--warn); margin-top: 4px; }

  /* ---------- Level select ---------- */
  .levelList { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  .levelCard {
    display: flex; align-items: center; gap: 12px;
    background: var(--steel-light); border-radius: 14px; padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .levelCard:active { transform: scale(0.98); }
  .levelTier {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px;
    background: rgba(94,200,216,0.15); color: var(--accent);
  }
  .levelInfo { flex: 1; }
  .levelName { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .levelDiff { font-size: 11px; color: var(--text-dim); }
  .levelStars { color: var(--warn); font-size: 12px; }

  /* ---------- Game screen ---------- */
  #gameScreen { padding: 0; }
  #stage { position: fixed; inset: 0; display: block; }
  #hud {
    position: fixed; top: env(safe-area-inset-top, 0); left: 0; right: 0;
    padding: 12px 14px 0 14px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 4;
  }
  .hud-left, .hud-right { display: flex; flex-direction: column; gap: 6px; }
  .hud-block {
    background: rgba(20, 23, 28, 0.6); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 6px 11px; backdrop-filter: blur(6px);
  }
  .hud-label { font-size: 9px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-dim); }
  .hud-value { font-size: 14px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .hud-value.warnColor { color: var(--danger); }
  #exitBtn {
    pointer-events: auto; appearance: none; border: none;
    background: rgba(30,34,41,0.7); color: var(--text); font-size: 13px; font-weight: 600;
    padding: 8px 13px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
  }

  /* ---------- Overlays (permission + win/fail) ---------- */
  #permOverlay, #resultOverlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 32px;
    background: radial-gradient(circle at 50% 35%, #1c2028 0%, #101317 80%);
    transition: opacity 0.3s ease;
  }
  #permOverlay.hidden, #resultOverlay.hidden { opacity: 0; pointer-events: none; display: none; }
  .marble-preview {
    width: 56px; height: 56px; border-radius: 50%; margin-bottom: 18px;
    background: radial-gradient(circle at 32% 28%, #f5f7f9 0%, #b7c1cb 22%, #6b7580 55%, #2a2f38 85%, #16181c 100%);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 0 8px rgba(255,255,255,0.15);
  }
  #permOverlay h1, #resultOverlay h2 { font-size: 20px; font-weight: 700; margin: 0 0 8px 0; }
  #permOverlay p, #resultOverlay p { color: var(--text-dim); font-size: 13px; line-height: 1.5; max-width: 300px; margin: 0 0 22px 0; }
  button.primary {
    appearance: none; border: none; background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
    color: #0a1214; font-size: 15px; font-weight: 700; padding: 13px 28px; border-radius: 12px;
    box-shadow: 0 6px 18px rgba(94, 200, 216, 0.25); margin: 4px;
  }
  button.secondary {
    appearance: none; border: 1px solid rgba(255,255,255,0.15); background: transparent;
    color: var(--text); font-size: 14px; font-weight: 600; padding: 12px 24px; border-radius: 12px; margin: 4px;
  }
  button:active { transform: scale(0.97); }
  #permStatus { margin-top: 14px; font-size: 12px; color: var(--danger); max-width: 300px; }
  #resultIcon { font-size: 40px; margin-bottom: 10px; }
  .btnRow { display: flex; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>

<!-- ===================== CATEGORY MENU ===================== -->
<div class="screen active" id="menuScreen">
  <h1 class="title">Tilt Marble</h1>
  <p class="subtitle">Pick a challenge type. Each has 3 levels of increasing difficulty.</p>
  <div class="catGrid" id="catGrid"></div>
</div>

<!-- ===================== LEVEL SELECT ===================== -->
<div class="screen" id="levelSelectScreen">
  <div class="topbar">
    <button class="backBtn" id="levelSelectBack">‹ Categories</button>
  </div>
  <h1 class="title" id="levelSelectTitle">Category</h1>
  <p class="subtitle" id="levelSelectDesc"></p>
  <div class="levelList" id="levelList"></div>
</div>

<!-- ===================== GAME ===================== -->
<div class="screen" id="gameScreen">
  <canvas id="stage"></canvas>
  <div id="hud">
    <div class="hud-left">
      <div class="hud-block"><div class="hud-label">Level</div><div class="hud-value" id="hudLevelName">-</div></div>
      <div class="hud-block" id="hudTimerBlock" style="display:none;"><div class="hud-label">Time</div><div class="hud-value" id="hudTimer">--</div></div>
      <div class="hud-block" id="hudObjectiveBlock" style="display:none;"><div class="hud-label">Objective</div><div class="hud-value" id="hudObjective">-</div></div>
    </div>
    <div class="hud-right">
      <button id="exitBtn">✕ Exit</button>
    </div>
  </div>
</div>

<!-- ===================== PERMISSION OVERLAY ===================== -->
<div id="permOverlay">
  <div class="marble-preview"></div>
  <h1>Tilt Marble</h1>
  <p>Hold your phone flat. Tilt it to roll the marble — tilt the other way to slow, stop, or reverse it.</p>
  <button class="primary" id="startBtn">Enable Tilt Controls</button>
  <div id="permStatus"></div>
</div>

<!-- ===================== WIN / FAIL OVERLAY ===================== -->
<div id="resultOverlay" class="hidden">
  <div id="resultIcon">🏁</div>
  <h2 id="resultTitle">Level Complete</h2>
  <p id="resultMessage"></p>
  <div class="btnRow">
    <button class="secondary" id="resultRetry">Retry</button>
    <button class="secondary" id="resultMenu">Level Select</button>
    <button class="primary" id="resultNext" style="display:none;">Next Level</button>
  </div>
</div>

/* =====================================================================
   CANVAS SIZING
   ===================================================================== */
let W, H, DPR, cellSize, offsetX, offsetY;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  cellSize = Math.min(W / COLS, H / ROWS);
  offsetX = (W - cellSize * COLS) / 2;
  offsetY = (H - cellSize * ROWS) / 2;
}
window.addEventListener('resize', resize);
resize();

function toPx(col, row) { return { x: offsetX + col * cellSize, y: offsetY + row * cellSize }; }
function cellOf(x, y) { return { col: Math.floor((x - offsetX) / cellSize), row: Math.floor((y - offsetY) / cellSize) }; }

/* =====================================================================
   TILT INPUT
   ===================================================================== */
let rawBeta = 0, rawGamma = 0, betaOffset = 0, gammaOffset = 0, eventsReceived = 0;
function handleOrientation(e) {
  if (e.beta === null || e.gamma === null) return;
  eventsReceived++;
  rawBeta = e.beta;
  rawGamma = e.gamma;
}
function currentTilt() {
  let beta = rawBeta - betaOffset;
  let gamma = rawGamma - gammaOffset;
  if (beta > 180) beta -= 360;
  if (beta < -180) beta += 360;
  return { beta, gamma };
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

/* =====================================================================
   GAME STATE
   ===================================================================== */
let level = null;
let tiles = [];           // 2D array of chars, mutable copy of grid
let marble = { x:0, y:0, vx:0, vy:0, r:0 };
let pins = [];
let breakableHp = {};      // key "col,row" -> hp
let doorOpenState = {};    // door id -> bool
let switchActive = {};     // switch id -> bool
let sequenceProgress = 0;
let plateWeighted = false;
let heavyBlocks = [];
let targetBall = null;
let hazards = [];
let projectiles = [];
let crumbleTimers = {};    // key -> touchedAt time
let floodElapsed = 0;
let floodIndex = 0;
let timedDoorsState = [];
let elapsedTime = 0;
let running = false;
let gameOver = false;
let lastTime = null;
let fallAnim = null;       // {progress} when marble is falling into void

function keyOf(col, row) { return col + ',' + row; }

function loadLevel(lvl) {
  level = lvl;
  tiles = lvl.grid.map(row => row.split(''));
  gameOver = false;
  fallAnim = null;
  elapsedTime = 0;
  floodElapsed = 0;
  floodIndex = 0;
  sequenceProgress = 0;
  switchActive = {};
  doorOpenState = {};
  breakableHp = {};
  crumbleTimers = {};
  plateWeighted = false;
  pins = [];
  heavyBlocks = [];
  targetBall = null;
  hazards = [];
  projectiles = [];

  let startCol = 1, startRow = 1;

  for (let r = 0; r < tiles.length; r++) {
    for (let c = 0; c < tiles[r].length; c++) {
      const ch = tiles[r][c];
      if (ch === 'S') { startCol = c; startRow = r; tiles[r][c] = '.'; }
      else if (ch === 'P') { pins.push({ col:c, row:r, state:'up' }); tiles[r][c] = '.'; }
      else if (ch === 'B') { breakableHp[keyOf(c,r)] = 2; }
      else if (ch === 'O') { targetBall = { col:c, row:r }; tiles[r][c] = '.'; }
      else if (ch === 'H') { heavyBlocks.push({ col:c, row:r }); tiles[r][c] = '.'; }
      else if (ch === 'T') { /* timed door placeholder handled via level.timedDoors */ }
    }
  }

  (lvl.doors || []).forEach(d => { doorOpenState[d.id] = false; });
  (lvl.switches || []).forEach(s => { switchActive[s.id] = false; });
  (lvl.timedDoors || []).forEach(() => {});
  timedDoorsState = (lvl.timedDoors || []).map(() => ({ open:false }));

  (lvl.hazards || []).forEach(hz => {
    hazards.push(Object.assign({}, hz, {
      x: (hz.col !== undefined ? hz.col : hz.from) * 1,
      y: (hz.row !== undefined ? hz.row : hz.from) * 1,
      dirSign: 1,
      cooldown: 0
    }));
  });

  const startPx = toPx(startCol + 0.5, startRow + 0.5);
  marble.x = startPx.x; marble.y = startPx.y;
  marble.vx = 0; marble.vy = 0;
  marble.r = cellSize * 0.30;

  betaOffset = rawBeta; gammaOffset = rawGamma; // auto-recenter on level load

  updateHud();
}

function tileAt(col, row) {
  if (row < 0 || row >= tiles.length || col < 0 || col >= tiles[row].length) return '#';
  return tiles[row][col];
}
function setTile(col, row, ch) { if (tiles[row]) tiles[row][col] = ch; }

function isDoorChar(ch) { return level.doors && level.doors.some(d => d.id === ch); }
function doorAt(col, row) {
  if (!level.doors) return null;
  return level.doors.find(d => d.col === col && d.row === row) || null;
}
function isSolidTile(ch, col, row) {
  if (ch === '#') return true;
  if (ch === 'B') return (breakableHp[keyOf(col,row)] || 0) > 0;
  const door = doorAt(col, row);
  if (door) return !doorOpenState[door.id];
  return false;
}

/* =====================================================================
   PHYSICS STEP
   ===================================================================== */
function step(dt) {
  elapsedTime += dt;

  // --- Tilt-based acceleration ---
  const { beta, gamma } = currentTilt();
  let b = Math.abs(beta) < DEADZONE_DEG ? 0 : beta;
  let g = Math.abs(gamma) < DEADZONE_DEG ? 0 : gamma;
  const gx = clamp(g / MAX_TILT_DEG, -1, 1);
  const gy = clamp(b / MAX_TILT_DEG, -1, 1);
  let ax = gx * SENSITIVITY;
  let ay = gy * SENSITIVITY;

  // --- Force zones (inclines) ---
  const mCell = { col: (marble.x - offsetX) / cellSize, row: (marble.y - offsetY) / cellSize };
  (level.forceZones || []).forEach(z => {
    if (z.radial) {
      const dx = z.cx - mCell.col, dy = z.cy - mCell.row;
      const dist = Math.hypot(dx, dy) || 0.001;
      ax += (dx / dist) * z.strength;
      ay += (dy / dist) * z.strength;
    } else if (mCell.col >= z.x1 && mCell.col <= z.x2 && mCell.row >= z.y1 && mCell.row <= z.y2) {
      const len = Math.hypot(z.dir.x, z.dir.y) || 1;
      ax += (z.dir.x / len) * z.strength;
      ay += (z.dir.y / len) * z.strength;
    }
  });

  marble.vx += ax * dt;
  marble.vy += ay * dt;

  // --- Friction (tile-dependent) ---
  const curTile = tileAt(Math.floor(mCell.col), Math.floor(mCell.row));
  let frictionBase = FRICTION;
  if (curTile === 'I') frictionBase = 0.985;   // ice: barely any friction
  const damp = Math.pow(frictionBase, dt);
  marble.vx *= damp;
  marble.vy *= damp;

  marble.x += marble.vx * dt;
  marble.y += marble.vy * dt;

  // --- Collisions with grid ---
  resolveGridCollisions(marble, dt);

  // --- Crumble tiles ---
  const curCol = Math.floor(mCell.col), curRow = Math.floor(mCell.row);
  if (tileAt(curCol, curRow) === 'C') {
    const key = keyOf(curCol, curRow);
    if (!crumbleTimers[key]) crumbleTimers[key] = elapsedTime;
    if (elapsedTime - crumbleTimers[key] > 0.4) setTile(curCol, curRow, ' ');
  }

  // --- Pins ---
  pins.forEach(p => {
    if (p.state === 'down') return;
    const px = toPx(p.col + 0.5, p.row + 0.5);
    const dx = marble.x - px.x, dy = marble.y - px.y;
    const dist = Math.hypot(dx, dy);
    const pr = cellSize * 0.28;
    if (dist < marble.r + pr) {
      const speed = Math.hypot(marble.vx, marble.vy);
      if (speed > TOPPLE_SPEED) {
        p.state = 'down';
      } else {
        const nx = dx / (dist || 1), ny = dy / (dist || 1);
        const overlap = (marble.r + pr) - dist;
        marble.x += nx * overlap; marble.y += ny * overlap;
        const vn = marble.vx * nx + marble.vy * ny;
        marble.vx -= 2 * vn * nx * RESTITUTION;
        marble.vy -= 2 * vn * ny * RESTITUTION;
      }
    }
  });

  // --- Breakable walls (damage on hit) ---
  Object.keys(breakableHp).forEach(key => {
    if (breakableHp[key] <= 0) return;
    const [c, r] = key.split(',').map(Number);
    const cellPx = toPx(c, r);
    const cx = cellPx.x + cellSize/2, cy = cellPx.y + cellSize/2;
    const dx = marble.x - cx, dy = marble.y - cy;
    if (Math.abs(dx) < cellSize/2 + marble.r && Math.abs(dy) < cellSize/2 + marble.r) {
      const speed = Math.hypot(marble.vx, marble.vy);
      if (speed > BREAK_SPEED && !breakableHp['_cool_' + key]) {
        breakableHp[key] -= 1;
        breakableHp['_cool_' + key] = 1;
        if (breakableHp[key] <= 0) setTile(c, r, '.');
      }
    } else {
      breakableHp['_cool_' + key] = 0;
    }
  });

  // --- Heavy blocks / target ball ---
  const allBlocks = heavyBlocks.concat(targetBall ? [targetBall] : []);
  allBlocks.forEach(blk => {
    const bp = toPx(blk.col + 0.5, blk.row + 0.5);
    if (blk._px === undefined) { blk._px = bp.x; blk._py = bp.y; blk._vx = 0; blk._vy = 0; }
    const dx = blk._px - marble.x, dy = blk._py - marble.y;
    const dist = Math.hypot(dx, dy);
    const br = cellSize * 0.3;
    if (dist < marble.r + br) {
      const speed = Math.hypot(marble.vx, marble.vy);
      const nx = dx / (dist || 1), ny = dy / (dist || 1);
      const overlap = (marble.r + br) - dist;
      blk._px += nx * overlap * 0.6; blk._py += ny * overlap * 0.6;
      marble.x -= nx * overlap * 0.4; marble.y -= ny * overlap * 0.4;
      if (speed > BLOCK_PUSH_SPEED) {
        blk._vx += nx * speed * 0.5;
        blk._vy += ny * speed * 0.5;
        marble.vx *= 0.5; marble.vy *= 0.5;
      }
    }
    blk._vx *= Math.pow(0.9, dt * 60);
    blk._vy *= Math.pow(0.9, dt * 60);
    blk._px += blk._vx * dt;
    blk._py += blk._vy * dt;
    resolveGridCollisionsGeneric(blk, cellSize * 0.3, dt, true);
    blk.col = (blk._px - offsetX) / cellSize - 0.5;
    blk.row = (blk._py - offsetY) / cellSize - 0.5;
  });

  // --- Hazards ---
  updateHazards(dt);
  projectiles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; });
  projectiles = projectiles.filter(p => {
    const c = cellOf(p.x, p.y);
    return c.col >= 0 && c.col < COLS && c.row >= 0 && c.row < ROWS;
  });

  // hazard/projectile collision with marble
  const allThreats = hazards.concat(projectiles);
  for (const hz of allThreats) {
    const hzPx = (hz.type === 'patrol' && hz.axis === 'y') ? toPx(hz.col, hz.y) :
                 (hz.type) ? toPx(hz.x !== undefined ? hz.x : hz.col, hz.y !== undefined ? hz.y : hz.row) :
                 { x: hz.x, y: hz.y };
    const size = (hz.size || 0.35) * cellSize;
    const dx = marble.x - hzPx.x, dy = marble.y - hzPx.y;
    if (Math.hypot(dx, dy) < marble.r + size) {
      triggerFail('hit', 'Something got you.');
      return;
    }
  }

  // --- Switches ---
  (level.switches || []).forEach(sw => {
    const swPx = toPx(sw.col + 0.5, sw.row + 0.5);
    const dist = Math.hypot(marble.x - swPx.x, marble.y - swPx.y);
    if (dist < marble.r + cellSize * 0.22 && !switchActive[sw.id]) {
      if (level.sequenceMode) {
        const order = level.switches.map(s => s.id);
        const expected = order[sequenceProgress];
        if (sw.id === expected) {
          switchActive[sw.id] = true;
          sequenceProgress++;
          if (sequenceProgress >= order.length) {
            sw.doors.forEach(d => doorOpenState[d] = true);
          }
        } else {
          order.forEach(id => switchActive[id] = false);
          sequenceProgress = 0;
          Object.keys(doorOpenState).forEach(d => doorOpenState[d] = false);
        }
      } else {
        switchActive[sw.id] = true;
        sw.doors.forEach(d => doorOpenState[d] = true);
      }
    }
  });

  // --- Pressure plate ---
  if (level.plate) {
    const pp = level.plate;
    const ppPx = toPx(pp.col + 0.5, pp.row + 0.5);
    let weighted = Math.hypot(marble.x - ppPx.x, marble.y - ppPx.y) < cellSize * 0.4;
    heavyBlocks.forEach(blk => {
      if (Math.hypot(blk._px - ppPx.x, blk._py - ppPx.y) < cellSize * 0.4) weighted = true;
    });
    plateWeighted = weighted;
    pp.doors.forEach(d => doorOpenState[d] = weighted);
  }

  // --- Timed doors ---
  (level.timedDoors || []).forEach((td, i) => {
    const cyclePos = (elapsedTime + td.phase) % td.period;
    timedDoorsState[i].open = cyclePos < td.openDuration;
  });

  // --- Flood ---
  if (level.flood) {
    floodElapsed += dt;
    if (floodElapsed > level.flood.interval && floodIndex < level.flood.rows.length) {
      floodElapsed = 0;
      const r = level.flood.rows[floodIndex];
      for (let c = 1; c < COLS - 1; c++) {
        if (tileAt(c, r) !== '#' && tileAt(c,r) !== 'G' ) setTile(c, r, ' ');
      }
      floodIndex++;
    }
  }

  // --- Fall / void check ---
  const cc = Math.floor(mCell.col), rr = Math.floor(mCell.row);
  const underTile = tileAt(cc, rr);
  if (underTile === ' ' && !fallAnim) {
    triggerFail('fall', level.flood && level.flood.theme === 'lava' ? 'Swallowed by lava.' : 'You fell off the edge.');
    return;
  }

  // --- Win check ---
  checkWin();
}

function resolveGridCollisions(body, dt) {
  resolveGridCollisionsGeneric(body, body.r, dt, false);
}

function resolveGridCollisionsGeneric(body, radius, dt, isBlock) {
  const centerCell = cellOf(isBlock ? body._px : body.x, isBlock ? body._py : body.y);
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const col = centerCell.col + dc, row = centerCell.row + dr;
      const ch = tileAt(col, row);
      let solid = isSolidTile(ch, col, row);
      let oneWayBlock = false;
      if (ch === '>' || ch === '<') {
        // one-way: block if moving against the allowed direction while overlapping
        const bvx = isBlock ? body._vx : body.vx;
        const allowedSign = ch === '>' ? 1 : -1;
        if (bvx * allowedSign < -5) oneWayBlock = true;
      }
      if (!solid && !oneWayBlock) continue;

      const cellPx = toPx(col, row);
      const left = cellPx.x, top = cellPx.y, right = left + cellSize, bottom = top + cellSize;
      const bx = isBlock ? body._px : body.x, by = isBlock ? body._py : body.y;
      const closestX = clamp(bx, left, right);
      const closestY = clamp(by, top, bottom);
      const dx = bx - closestX, dy = by - closestY;
      const dist = Math.hypot(dx, dy);
      if (dist < radius && dist > 0.0001) {
        const overlap = radius - dist;
        const nx = dx / dist, ny = dy / dist;
        if (isBlock) {
          body._px += nx * overlap; body._py += ny * overlap;
          const vn = body._vx * nx + body._vy * ny;
          if (vn < 0) { body._vx -= vn * nx * (1+RESTITUTION); body._vy -= vn * ny * (1+RESTITUTION); }
        } else {
          body.x += nx * overlap; body.y += ny * overlap;
          const vn = body.vx * nx + body.vy * ny;
          if (vn < 0) { body.vx -= vn * nx * (1+RESTITUTION); body.vy -= vn * ny * (1+RESTITUTION); }
        }
      } else if (dist === 0) {
        // dead center overlap fallback
        if (isBlock) { body._vx *= -RESTITUTION; body._vy *= -RESTITUTION; }
        else { body.vx *= -RESTITUTION; body.vy *= -RESTITUTION; }
      }
    }
  }
}

function updateHazards(dt) {
  hazards.forEach(hz => {
    if (hz.type === 'patrol') {
      if (hz.axis === 'x') {
        hz.x += hz.dirSign * hz.speed * dt;
        if (hz.x > Math.max(hz.from, hz.to)) { hz.x = Math.max(hz.from, hz.to); hz.dirSign = -1; }
        if (hz.x < Math.min(hz.from, hz.to)) { hz.x = Math.min(hz.from, hz.to); hz.dirSign = 1; }
        hz.col = hz.x; hz.row = hz.row; hz.y = hz.row;
      } else {
        hz.y += hz.dirSign * hz.speed * dt;
        if (hz.y > Math.max(hz.from, hz.to)) { hz.y = Math.max(hz.from, hz.to); hz.dirSign = -1; }
        if (hz.y < Math.min(hz.from, hz.to)) { hz.y = Math.min(hz.from, hz.to); hz.dirSign = 1; }
        hz.x = hz.col;
      }
    } else if (hz.type === 'hunter') {
      const dx = marble.x - toPx(hz.x, hz.y).x;
      const dy = marble.y - toPx(hz.x, hz.y).y;
      const dist = Math.hypot(dx, dy) || 1;
      hz.x += (dx/dist) * (hz.speed*dt)/cellSize;
      hz.y += (dy/dist) * (hz.speed*dt)/cellSize;
    } else if (hz.type === 'turret') {
      hz.cooldown -= dt;
      if (hz.cooldown <= 0) {
        hz.cooldown = hz.interval;
        const p = toPx(hz.col + 0.5, hz.row + 0.5);
        projectiles.push({
          x: p.x, y: p.y,
          vx: hz.dir.x * hz.projSpeed * cellSize,
          vy: hz.dir.y * hz.projSpeed * cellSize,
          size: hz.size || 0.25
        });
      }
      hz.x = hz.col; hz.y = hz.row;
    }
  });
}

function checkWin() {
  if (gameOver) return;
  if (level.winType === 'pocket') {
    const pocket = findChar('K');
    if (pocket && targetBall) {
      const pp = toPx(pocket.col + 0.5, pocket.row + 0.5);
      const dist = Math.hypot(targetBall._px - pp.x, targetBall._py - pp.y);
      if (dist < cellSize * 0.3) triggerWin();
    }
    return;
  }
  const goal = findChar('G');
  if (!goal) return;
  const gp = toPx(goal.col + 0.5, goal.row + 0.5);
  const dist = Math.hypot(marble.x - gp.x, marble.y - gp.y);
  if (dist < cellSize * 0.35) {
    if (level.requireAllPinsDown && !pins.every(p => p.state === 'down')) return;
    triggerWin();
  }
}

function findChar(ch) {
  for (let r = 0; r < tiles.length; r++)
    for (let c = 0; c < tiles[r].length; c++)
      if (tiles[r][c] === ch) return { col:c, row:r };
  return null;
}

function triggerWin() {
  gameOver = true;
  running = false;
  showResult(true);
}
function triggerFail(reason, message) {
  gameOver = true;
  running = false;
  showResult(false, message);
}

/* =====================================================================
   RENDERING
   ===================================================================== */
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0e1013';
  ctx.fillRect(0, 0, W, H);

  for (let r = 0; r < tiles.length; r++) {
    for (let c = 0; c < tiles[r].length; c++) {
      const ch = tiles[r][c];
      const p = toPx(c, r);
      drawTile(ch, p.x, p.y, c, r);
    }
  }

  // pins
  pins.forEach(p => {
    if (p.state === 'down') return;
    const px = toPx(p.col + 0.5, p.row + 0.5);
    ctx.beginPath();
    ctx.arc(px.x, px.y, cellSize * 0.24, 0, Math.PI*2);
    const grad = ctx.createRadialGradient(px.x-4, px.y-6, 2, px.x, px.y, cellSize*0.24);
    grad.addColorStop(0, '#ffe9b0'); grad.addColorStop(1, '#c98f2e');
    ctx.fillStyle = grad;
    ctx.fill();
  });

  // heavy blocks + target ball
  heavyBlocks.forEach(b => drawBlock(b, '#8d97a3'));
  if (targetBall) drawBlock(targetBall, '#d8895e');

  // hazards
  hazards.forEach(hz => {
    let px;
    if (hz.type === 'turret') px = toPx(hz.col + 0.5, hz.row + 0.5);
    else px = toPx(hz.x + (hz.type==='patrol'&&hz.axis==='x'?0:0.5), hz.y + (hz.type==='patrol'&&hz.axis==='y'?0:0.5));
    const size = (hz.size || 0.35) * cellSize;
    ctx.beginPath();
    ctx.arc(px.x, px.y, size, 0, Math.PI*2);
    ctx.fillStyle = hz.type === 'hunter' ? '#d84a4a' : (hz.type === 'turret' ? '#8a6bd8' : '#d86a5e');
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();
  });

  // projectiles
  projectiles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, (p.size||0.25)*cellSize, 0, Math.PI*2);
    ctx.fillStyle = '#8a6bd8';
    ctx.fill();
  });

  // marble
  drawMarble();
}

function drawTile(ch, x, y, c, r) {
  const s = cellSize;
  if (ch === '#') {
    ctx.fillStyle = '#2a2f38';
    ctx.fillRect(x, y, s, s);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.strokeRect(x+0.5, y+0.5, s-1, s-1);
    return;
  }
  if (ch === ' ') { return; } // void — background shows through
  if (ch === 'G') {
    ctx.fillStyle = '#1a2a24';
    ctx.fillRect(x, y, s, s);
    ctx.beginPath();
    ctx.arc(x+s/2, y+s/2, s*0.32, 0, Math.PI*2);
    ctx.strokeStyle = '#7ed6a5'; ctx.lineWidth = 3; ctx.stroke();
    return;
  }
  if (ch === 'K') {
    ctx.fillStyle = '#0e1013';
    ctx.beginPath(); ctx.arc(x+s/2, y+s/2, s*0.36, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.stroke();
    return;
  }
  if (ch === 'I') { ctx.fillStyle = '#204048'; ctx.fillRect(x,y,s,s); ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(x,y,s,s); return; }
  if (ch === 'C') { ctx.fillStyle = '#3a3226'; ctx.fillRect(x,y,s,s); return; }
  if (ch === 'B') {
    const hp = breakableHp[keyOf(c,r)] || 0;
    ctx.fillStyle = hp >= 2 ? '#7d5b8a' : '#4a3a52';
    ctx.fillRect(x,y,s,s);
    return;
  }
  const door = level.doors && level.doors.find(d => d.col === c && d.row === r);
  if (door) { ctx.fillStyle = doorOpenState[door.id] ? '#1a2a24' : '#5a3a3a'; ctx.fillRect(x,y,s,s); return; }
  if (level.plate && level.plate.col === c && level.plate.row === r) {
    ctx.fillStyle = plateWeighted ? '#3a5a48' : '#33373f'; ctx.fillRect(x,y,s,s); return;
  }
  if (level.switches && level.switches.some(sw => sw.col === c && sw.row === r)) {
    const sw = level.switches.find(sw => sw.col === c && sw.row === r);
    ctx.fillStyle = switchActive[sw.id] ? '#3a5a48' : '#33373f';
    ctx.fillRect(x,y,s,s);
    ctx.fillStyle = 'rgba(230,235,240,0.7)';
    ctx.font = (s*0.35)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(sw.id, x+s/2, y+s/2);
    return;
  }
  if (ch === '>' || ch === '<') {
    ctx.fillStyle = '#1c2a33'; ctx.fillRect(x,y,s,s);
    ctx.fillStyle = 'rgba(94,200,216,0.6)';
    ctx.font = (s*0.5)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ch, x+s/2, y+s/2);
    return;
  }
  if (level.timedDoors) {
    const idx = level.timedDoors.findIndex(td => td.col === c && td.row === r);
    if (idx >= 0) {
      const open = timedDoorsState[idx] && timedDoorsState[idx].open;
      ctx.fillStyle = open ? '#1a2a24' : '#5a3a3a';
      ctx.fillRect(x,y,s,s);
      return;
    }
  }
  // default floor
  ctx.fillStyle = ((c+r) % 2 === 0) ? '#1c2028' : '#191d24';
  ctx.fillRect(x, y, s, s);
}

function drawBlock(b, color) {
  const x = b._px !== undefined ? b._px : toPx(b.col+0.5, b.row+0.5).x;
  const y = b._py !== undefined ? b._py : toPx(b.col+0.5, b.row+0.5).y;
  const r = cellSize * 0.3;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  const grad = ctx.createRadialGradient(x-4,y-6,2,x,y,r);
  grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.4, color); grad.addColorStop(1, '#1c2026');
  ctx.fillStyle = grad;
  ctx.fill();
}

function drawMarble() {
  const r = marble.r;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(marble.x, marble.y + r*0.55, r*0.95, r*0.4, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fill();
  ctx.restore();

  const grad = ctx.createRadialGradient(
    marble.x - r*0.35, marble.y - r*0.4, r*0.1, marble.x, marble.y, r
  );
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.18, '#e8edf1');
  grad.addColorStop(0.4, '#aab4bf');
  grad.addColorStop(0.7, '#5b6570');
  grad.addColorStop(1, '#1c2026');

  ctx.beginPath();
  ctx.arc(marble.x, marble.y, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(94, 200, 216, 0.25)'; ctx.lineWidth = 1; ctx.stroke();
}

/* =====================================================================
   HUD
   ===================================================================== */
function updateHud() {
  hudLevelName.textContent = level.name;
  hudTimerBlock.style.display = level.flood ? 'block' : 'none';
  hudObjectiveBlock.style.display = level.requireAllPinsDown || level.sequenceMode || level.winType === 'pocket' ? 'block' : 'none';
  if (level.requireAllPinsDown) hudObjective.textContent = 'Knock down all pins';
  else if (level.sequenceMode) hudObjective.textContent = 'Hit switches in order';
  else if (level.winType === 'pocket') hudObjective.textContent = 'Push ball into pocket';
}

function tickHud() {
  if (level.flood) {
    const remaining = Math.max(0, level.flood.rows.length * level.flood.interval - (floodIndex * level.flood.interval + floodElapsed));
    hudTimer.textContent = remaining.toFixed(1) + 's';
    hudTimer.classList.toggle('warnColor', remaining < 5);
  }
}

/* =====================================================================
   GAME LOOP
   ===================================================================== */
function loop(t) {
  if (!running) return;
  if (lastTime === null) lastTime = t;
  let dt = Math.min((t - lastTime) / 1000, 0.05);
  lastTime = t;
  step(dt);
  tickHud();
  draw();
  requestAnimationFrame(loop);
}

function startLoop() {
  running = true;
  lastTime = null;
  requestAnimationFrame(loop);
}

/* =====================================================================
   FLOW: menu -> level select -> game -> result
   ===================================================================== */
let sensorsReady = false;
let pendingLevelId = null;

function startLevel(id) {
  const lvl = LEVELS.find(l => l.id === id);
  if (!lvl) return;
  pendingLevelId = id;
  if (!sensorsReady) {
    permOverlay.classList.remove('hidden');
    return;
  }
  resize();
  showScreen('game');
  loadLevel(lvl);
  resultOverlay.classList.add('hidden');
  startLoop();
}

startBtn.addEventListener('click', async () => {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result === 'granted') {
        window.addEventListener('deviceorientation', handleOrientation, true);
        sensorsReady = true;
        permOverlay.classList.add('hidden');
        if (pendingLevelId) startLevel(pendingLevelId);
      } else {
        permStatus.textContent = 'Motion access denied. Enable it in Settings → Safari → Motion & Orientation Access, then reload.';
      }
    } catch (err) {
      permStatus.textContent = 'Could not request motion permission: ' + err.message;
    }
  } else if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', handleOrientation, true);
    sensorsReady = true;
    permOverlay.classList.add('hidden');
    if (!window.isSecureContext) {
      permStatus.textContent = '⚠️ Not on HTTPS/localhost — sensors may not fire. Host this over HTTPS.';
    }
    if (pendingLevelId) startLevel(pendingLevelId);
  } else {
    permStatus.textContent = 'This device/browser does not support motion tilt input.';
  }
});

document.getElementById('exitBtn').addEventListener('click', () => {
  running = false;
  showScreen('levelSelect');
});

function showResult(won, message) {
  resultOverlay.classList.remove('hidden');
  if (won) {
    resultIcon.textContent = '🏁';
    resultTitle.textContent = 'Level Complete';
    resultMessage.textContent = 'Nicely rolled.';
    const cat = level.category, tier = level.tier;
    const next = LEVELS.find(l => l.category === cat && l.tier === tier + 1);
    resultNext.style.display = next ? 'inline-block' : 'none';
    resultNext.onclick = () => { resultOverlay.classList.add('hidden'); startLevel(next.id); };
  } else {
    resultIcon.textContent = '💥';
    resultTitle.textContent = 'Try Again';
    resultMessage.textContent = message || 'That didn\'t go as planned.';
    resultNext.style.display = 'none';
  }
}

resultRetry.addEventListener('click', () => {
  resultOverlay.classList.add('hidden');
  startLevel(level.id);
});
resultMenu.addEventListener('click', () => {
  running = false;
  resultOverlay.classList.add('hidden');
  showScreen('levelSelect');
});

})();
</script>
